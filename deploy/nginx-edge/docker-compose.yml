services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SERVER_NAME: ${SERVER_NAME}
      FRONTEND_UPSTREAM_1: ${FRONTEND_UPSTREAM_1}
      FRONTEND_UPSTREAM_2: ${FRONTEND_UPSTREAM_2}
      CORE_UPSTREAM_1: ${CORE_UPSTREAM_1}
      CORE_UPSTREAM_2: ${CORE_UPSTREAM_2}
      FINANCIAL_UPSTREAM_1: ${FINANCIAL_UPSTREAM_1}
      FINANCIAL_UPSTREAM_2: ${FINANCIAL_UPSTREAM_2}
    volumes:
      - ./templates/default.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./certs:/etc/nginx/certs:ro
